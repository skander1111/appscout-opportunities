name: Deploy to Vercel

on:
  push:
    branches: [master, main]
    paths:
      - 'web/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        run: npm ci
        working-directory: web

      - name: Deploy to Vercel (production)
        working-directory: web
        run: env -u GITHUB_ACTIONS npx vercel@47 --prod --yes --token ${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: team_IOSygucOFdZ8IjYAquZlQ0NG
          VERCEL_PROJECT_ID: prj_pOrzsb5MxsL41AJuWIDVL9dvrnOg
