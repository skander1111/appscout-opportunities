name: Weekly AppScout Run

on:
  schedule:
    # Every Monday at 06:00 UTC
    - cron: '0 6 * * 1'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── Install root deps (research engine) ───────────────────────────────

      - name: Install engine dependencies
        run: npm ci

      # ── Run research engine ───────────────────────────────────────────────

      - name: Run research engine
        run: node research-engine.js
        env:
          NODE_OPTIONS: '--max-old-space-size=512'

      # ── Generate clean report ─────────────────────────────────────────────

      - name: Generate clean report
        run: node scripts/auto-report.js

      # ── Sync engine output → web/data/ ───────────────────────────────────

      - name: Sync web data files
        run: |
          cp data/processed/scored-apps.json web/data/opportunities.json
          node -e "
            const fs = require('fs');
            const apps = JSON.parse(fs.readFileSync('data/processed/scored-apps.json'));
            const valid = apps.filter(a => !a.disqualified);
            const meta = { lastUpdated: new Date().toISOString(), appsScored: valid.length };
            fs.writeFileSync('web/data/meta.json', JSON.stringify(meta, null, 2));
          "

      # ── Merge iOS App Store results ──────────────────────────────────────

      - name: Ingest iOS App Store
        run: node scripts/ingest-ios.js
        continue-on-error: true

      # ── Pull tech magazine RSS feeds ─────────────────────────────────────

      - name: Ingest tech-magazine signals (RSS)
        run: node scripts/ingest-news.js
        continue-on-error: true

      # ── Pull tech news via NewsAPI ───────────────────────────────────────

      - name: Ingest NewsAPI signals
        run: node scripts/ingest-newsapi.js
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        continue-on-error: true

      # ── Pull Product Hunt launches ───────────────────────────────────────

      - name: Ingest Product Hunt
        run: node scripts/ingest-producthunt.js
        env:
          PRODUCTHUNT_API_KEY: ${{ secrets.PRODUCTHUNT_API_KEY }}
          PRODUCTHUNT_API_SECRET: ${{ secrets.PRODUCTHUNT_API_SECRET }}
        continue-on-error: true

      # ── Pull Threads posts ────────────────────────────────────────────────

      - name: Ingest Threads posts
        run: node scripts/ingest-threads.js
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          THREADS_ACCESS_TOKEN_DE: ${{ secrets.THREADS_ACCESS_TOKEN_DE }}
          THREADS_USER_ID_DE: ${{ secrets.THREADS_USER_ID_DE }}
        continue-on-error: true

      # ── Install web deps ──────────────────────────────────────────────────

      - name: Install web dependencies
        run: npm ci
        working-directory: web

      # ── Commit updated data ───────────────────────────────────────────────

      - name: Commit report and data
        run: |
          git config user.name "AppScout Bot"
          git config user.email "bot@appscout.io"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git add web/private/reports/latest-report.md data/reports/ || true
          git add data/processed/scored-apps.json || true
          git add web/data/opportunities.json web/data/meta.json web/data/signals.json || true
          git diff --staged --quiet || git commit -m "chore: weekly report $(date +%Y-%m-%d)"
          git push origin HEAD:main

      # ── Email subscribers ─────────────────────────────────────────────────

      - name: Email subscribers
        run: node scripts/email-subscribers.js
        env:
          GUMROAD_ACCESS_TOKEN: ${{ secrets.GUMROAD_ACCESS_TOKEN }}
          GUMROAD_PRODUCT_ID: ${{ secrets.GUMROAD_PRODUCT_ID }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}

      # ── Deploy to Vercel ──────────────────────────────────────────────────

      - name: Deploy to Vercel (production)
        working-directory: web
        run: env -u GITHUB_ACTIONS npx vercel@latest --prod --yes --token ${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: team_IOSygucOFdZ8IjYAquZlQ0NG
          VERCEL_PROJECT_ID: prj_pOrzsb5MxsL41AJuWIDVL9dvrnOg
